services:
  frontend:
    container_name: vms-sveltekit-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://apitest.semar.biz.id/api/v1
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8082
    restart: unless-stopped